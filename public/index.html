<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#3d6b4a" />
    <meta name="description" content="Feed Me — Plan it. Prep it. Cut the crap." />

    <!-- PWA: Add to Home Screen on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Feed Me" />

    <!-- PWA: Add to Home Screen on Android -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>🍴 Feed Me</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #fdf8f0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Prevent iOS tap highlight */
      * { -webkit-tap-highlight-color: transparent; }
      /* Smooth scrolling */
      html { scroll-behavior: smooth; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Feed Me.</noscript>
    <div id="root"></div>
  </body>
</html>
